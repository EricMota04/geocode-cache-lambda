name: Deploy

# Build + package the Lambda, then Terraform plan (on PR) / apply (on push to main).
# Auth uses GitHub OIDC -> the IAM role created by infra/bootstrap (no static AWS keys).
#
# Required repo variables (Settings -> Secrets and variables -> Actions -> Variables):
#   AWS_REGION           e.g. us-east-1
#   AWS_DEPLOY_ROLE_ARN  output `deploy_role_arn` from infra/bootstrap
#   TF_STATE_BUCKET      S3 bucket for Terraform state
#   TF_STATE_KEY         e.g. geocode-cache/dev/terraform.tfstate  (optional; defaults below)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write # required for OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Package & Terraform
    runs-on: ubuntu-latest
    environment: dev
    env:
      CI: "true"
      DOTNET_NOLOGO: "true"
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'geocode-cache/dev/terraform.tfstate' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Amazon.Lambda.Tools
        run: dotnet tool install -g Amazon.Lambda.Tools

      - name: Build & test
        run: |
          dotnet build GeocodeCache.slnx -c Release
          dotnet test GeocodeCache.slnx -c Release --no-build --filter "Category!=Integration"

      - name: Package Lambda
        run: ./scripts/package-lambda.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure S3 backend
        working-directory: infra/terraform
        run: |
          cat > ci_backend.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        working-directory: infra/terraform
        run: terraform plan -input=false -no-color

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infra/terraform
        run: terraform apply -input=false -auto-approve -no-color

name: CI

# Build and test on every push and pull request.
# Deployment (terraform plan/apply, lambda packaging) lives in deploy.yml (added later).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Build with the .NET 10 SDK; also install the .NET 8 runtime so net8.0 tests
          # execute on the same runtime as production (the Lambda dotnet8 managed runtime).
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore GeocodeCache.slnx

      - name: Build
        run: dotnet build GeocodeCache.slnx -c Release --no-restore

      - name: Test (unit)
        # Run the unit-test project directly. The integration suite (DynamoDB Local) is opt-in and
        # is intentionally not executed here; the solution build above still compiles it.
        run: >
          dotnet test tests/GeocodeCache.UnitTests/GeocodeCache.UnitTests.csproj -c Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/**"
          if-no-files-found: ignore

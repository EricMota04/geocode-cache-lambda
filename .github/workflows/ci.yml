name: CI

# Build and test on every push and pull request.
# Deployment (terraform plan/apply, lambda packaging) lives in deploy.yml (added later).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Build with the .NET 10 SDK; projects target net8.0 (the Lambda managed runtime).
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GeocodeCache.slnx

      - name: Build
        run: dotnet build GeocodeCache.slnx -c Release --no-restore

      - name: Test (unit)
        # Integration tests are excluded by default (they need AWS-compatible endpoints).
        run: >
          dotnet test GeocodeCache.slnx -c Release --no-build
          --filter "Category!=Integration"
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/**"
          if-no-files-found: ignore
